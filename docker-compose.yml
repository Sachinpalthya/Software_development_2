services:
  web:
    build:
      context: ./SkillStreak_App
    volumes:
      - ./SkillStreak_App:/usr/src/app
      - /usr/src/app/node_modules # Prevent host node_modules from overwriting container node_modules
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: mysql:8.0
    restart: always
    env_file:
      - ./.env
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "8082:80"
    depends_on:
      - db

volumes:
  db_data:
